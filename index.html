<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Finanças">
  <meta name="theme-color" content="#05070a">
  <link rel="manifest" href="manifest.json">
  <title>Finanças Wingert | Modern</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Plus+Jakarta+Sans:wght@500;700;800&display=swap"
    rel="stylesheet">
  <style>
    :root {
      --bg: #05070a;
      --surface: rgba(255, 255, 255, 0.05);
      --surface-solid: #12141c;
      --border: rgba(255, 255, 255, 0.08);
      --text: #ffffff;
      --muted: #8e94a5;
      --green: #2ce58b;
      --red: #ff5a79;
      --blue: #4da1ff;
      --violet: #8b5cf6;
      --font-head: 'Plus Jakarta Sans', sans-serif;
      --font-body: 'Inter', sans-serif;
      --radius: 20px;
      --radius-sm: 12px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
      min-height: 100vh;
      max-width: 430px;
      margin: 0 auto;
      overflow-x: hidden;
      background-image:
        radial-gradient(circle at 0% 0%, rgba(139, 92, 246, 0.15) 0%, transparent 40%),
        radial-gradient(circle at 100% 100%, rgba(44, 229, 139, 0.1) 0%, transparent 40%);
      background-attachment: fixed;
    }

    /* ── HEADER ── */
    .header {
      padding: 60px 24px 24px;
      background: rgba(5, 7, 10, 0.8);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      position: sticky;
      top: 0;
      z-index: 100;
      border-bottom: 1px solid var(--border);
    }

    .header-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
    }

    .logo {
      font-family: var(--font-head);
      font-size: 24px;
      font-weight: 800;
      letter-spacing: -1px;
      background: linear-gradient(to right, #fff, var(--muted));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .logo span {
      color: var(--green);
      -webkit-text-fill-color: var(--green);
    }

    .month-nav {
      display: flex;
      align-items: center;
      background: var(--surface);
      padding: 4px;
      border-radius: 30px;
      border: 1px solid var(--border);
    }

    .month-nav button {
      background: transparent;
      border: none;
      color: var(--text);
      width: 28px;
      height: 28px;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s;
    }

    .month-nav button:active {
      background: var(--surface);
    }

    #month-label {
      font-size: 13px;
      font-weight: 600;
      padding: 0 12px;
      min-width: 110px;
      text-align: center;
      text-transform: capitalize;
    }

    /* ── TABS ── */
    .tabs {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      scrollbar-width: none;
      padding-bottom: 4px;
    }

    .tabs::-webkit-scrollbar {
      display: none;
    }

    .tab {
      padding: 10px 18px;
      border: 1px solid transparent;
      background: transparent;
      color: var(--muted);
      font-family: var(--font-body);
      font-size: 14px;
      font-weight: 500;
      border-radius: 12px;
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .tab.active {
      background: var(--text);
      color: var(--bg);
      font-weight: 600;
      transform: scale(1.05);
    }

    /* ── PAGES ── */
    .page {
      display: none;
      padding: 24px 20px 140px;
      animation: fadeIn 0.4s ease-out;
    }

    .page.active {
      display: block;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* ── MAIN BALANCE CARD ── */
    .balance-hero {
      background: linear-gradient(145deg, #1a1c26 0%, #0a0c12 100%);
      border: 1px solid var(--border);
      border-radius: 28px;
      padding: 32px 24px;
      margin-bottom: 24px;
      position: relative;
      overflow: hidden;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
    }

    .balance-hero::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(circle at center, rgba(77, 161, 255, 0.05) 0%, transparent 70%);
      pointer-events: none;
    }

    .hero-label {
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 8px;
      font-weight: 500;
    }

    .hero-value {
      font-family: var(--font-head);
      font-size: 40px;
      font-weight: 800;
      letter-spacing: -1px;
    }

    /* ── GRID CARDS ── */
    .stats-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-bottom: 32px;
    }

    .stat-card {
      background: var(--surface);
      backdrop-filter: blur(10px);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
    }

    .stat-label {
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 6px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .stat-value {
      font-family: var(--font-head);
      font-size: 20px;
      font-weight: 700;
    }

    .stat-value.green {
      color: var(--green);
    }

    .stat-value.red {
      color: var(--red);
    }

    /* ── TRANSACTIONS ── */
    .section-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }

    .section-title {
      font-family: var(--font-head);
      font-size: 18px;
      font-weight: 700;
    }

    .tx-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .tx-item {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 16px;
      display: flex;
      align-items: center;
      gap: 16px;
      transition: transform 0.2s;
    }

    .tx-item:active {
      transform: scale(0.98);
    }

    .tx-icon {
      width: 48px;
      height: 48px;
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }

    .tx-icon.income {
      background: rgba(44, 229, 139, 0.1);
      color: var(--green);
    }

    .tx-icon.expense {
      background: rgba(255, 90, 121, 0.1);
      color: var(--red);
    }

    .tx-info {
      flex: 1;
    }

    .tx-desc {
      font-size: 15px;
      font-weight: 600;
      margin-bottom: 2px;
    }

    .tx-meta {
      font-size: 12px;
      color: var(--muted);
    }

    .tx-amount {
      font-family: var(--font-head);
      font-size: 16px;
      font-weight: 700;
      text-align: right;
    }

    /* ── BUDGET ── */
    .budget-card {
      background: rgba(77, 161, 255, 0.05);
      border: 1px solid rgba(77, 161, 255, 0.2);
      border-radius: var(--radius);
      padding: 20px;
      margin-bottom: 32px;
    }

    .progress-bg {
      background: rgba(255, 255, 255, 0.05);
      height: 8px;
      border-radius: 10px;
      margin: 12px 0;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      border-radius: 10px;
      transition: width 1s cubic-bezier(0.4, 0, 0.2, 1);
    }

    /* ── FAB ── */
    .fab {
      position: fixed;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--text);
      color: var(--bg);
      border: none;
      border-radius: 20px;
      padding: 18px 32px;
      font-family: var(--font-head);
      font-size: 16px;
      font-weight: 800;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
      z-index: 200;
      display: flex;
      align-items: center;
      gap: 10px;
      cursor: pointer;
    }

    .fab:active {
      transform: translateX(-50%) scale(0.95);
    }

    /* ── MODAL ── */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.8);
      backdrop-filter: blur(8px);
      z-index: 300;
      align-items: flex-end;
    }

    .modal-overlay.open {
      display: flex;
    }

    .modal {
      background: #12141c;
      border-radius: 32px 32px 0 0;
      padding: 24px 24px 48px;
      width: 100%;
      border-top: 1px solid var(--border);
      animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    }

    @keyframes slideUp {
      from {
        transform: translateY(100%);
      }

      to {
        transform: translateY(0);
      }
    }

    .form-input,
    .form-select {
      width: 100%;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid var(--border);
      border-radius: 16px;
      color: var(--text);
      padding: 16px;
      font-size: 16px;
      margin-bottom: 16px;
      outline: none;
    }

    .form-input:focus {
      border-color: var(--violet);
      background: rgba(255, 255, 255, 0.06);
    }

    .btn-submit {
      width: 100%;
      padding: 18px;
      border-radius: 16px;
      border: none;
      background: var(--green);
      color: #000;
      font-weight: 800;
      font-family: var(--font-head);
      font-size: 16px;
      cursor: pointer;
      margin-top: 10px;
    }

    /* ── CHART ELEMENTS ── */
    .chart-container {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 24px;
      margin-bottom: 20px;
    }

    .bar-item {
      margin-bottom: 18px;
    }

    .bar-info {
      display: flex;
      justify-content: space-between;
      font-size: 13px;
      margin-bottom: 8px;
      font-weight: 500;
    }

    .bar-track {
      height: 6px;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 10px;
      overflow: hidden;
    }

    .bar-fill {
      height: 100%;
      border-radius: 10px;
    }

    /* ── LOGIN OVERLAY ── */
    #login-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: var(--bg);
      background-image:
        radial-gradient(circle at 0% 0%, rgba(139, 92, 246, 0.15) 0%, transparent 40%),
        radial-gradient(circle at 100% 100%, rgba(44, 229, 139, 0.1) 0%, transparent 40%);
      z-index: 9999;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    #login-overlay.active {
      display: flex;
    }

    .login-title {
      font-family: var(--font-head);
      font-size: 24px;
      font-weight: 800;
      margin-bottom: 24px;
    }
  </style>
</head>

<body>

  <div id="login-overlay">
    <div class="logo" style="margin-bottom: 40px; font-size: 32px;">Finanças<span>Wingert</span></div>
    <div class="login-title">Acesso Restrito</div>
    <input type="password" id="login-password" class="form-input" placeholder="Digite sua senha"
      style="max-width: 300px;" onkeypress="if(event.key === 'Enter') checkLogin()">
    <button class="btn-submit" onclick="checkLogin()" style="max-width: 300px;">Entrar</button>
  </div>

  <div class="header">
    <div class="header-top">
      <div class="logo">Finanças<span>Wingert</span></div>
      <div class="month-nav">
        <button onclick="changeMonth(-1)">‹</button>
        <div id="month-label">Maio 2024</div>
        <button onclick="changeMonth(1)">›</button>
      </div>
    </div>
    <div class="tabs">
      <button class="tab active" data-page="dashboard" onclick="showPage('dashboard',this)">Resumo</button>
      <button class="tab" data-page="transactions" onclick="showPage('transactions',this)">Histórico</button>
      <button class="tab" data-page="charts" onclick="showPage('charts',this)">Análise</button>
      <button class="tab" data-page="settings" onclick="showPage('settings',this)">Ajustes</button>
    </div>
  </div>

  <div class="page active" id="page-dashboard">
    <div class="balance-hero">
      <div class="hero-label">Saldo Disponível</div>
      <div class="hero-value" id="bal-total">R$ 0,00</div>
    </div>

    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-label">Entradas</div>
        <div class="stat-value green" id="bal-income">R$ 0,00</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Saídas</div>
        <div class="stat-value red" id="bal-expense">R$ 0,00</div>
      </div>
    </div>

    <div id="budget-section"></div>

    <div class="section-header">
      <div class="section-title">Atividades recentes</div>
    </div>
    <div class="tx-list" id="dash-tx-list"></div>
  </div>

  <div class="page" id="page-transactions">
    <div class="section-header">
      <div class="section-title">Lançamentos do mês</div>
    </div>
    <div class="tx-list" id="all-tx-list"></div>
  </div>

  <div class="page" id="page-charts">
    <div class="chart-container">
      <div class="section-title" style="margin-bottom:20px">Gastos por Categoria</div>
      <div id="expense-bars"></div>
    </div>

    <div class="chart-container">
      <div class="section-title" style="margin-bottom:20px">Balanço Mensal</div>
      <div style="display:flex; justify-content: space-around; align-items:center;">
        <canvas id="donut" width="120" height="120"></canvas>
        <div id="donut-legend"></div>
      </div>
    </div>
  </div>

  <div class="page" id="page-settings">
    <div class="section-title" style="margin-bottom:20px">Configurações</div>

    <div class="stat-card" style="margin-bottom:16px">
      <div class="stat-label">Meta de gastos (Mensal)</div>
      <input type="number" id="budget-input" class="form-input" style="margin-bottom:0; margin-top:10px"
        oninput="saveBudget(this.value)">
    </div>

    <div class="stat-card" style="margin-bottom:16px">
      <div class="stat-label">Segurança</div>
      <input type="password" id="new-password-input" class="form-input" style="margin-bottom:0; margin-top:10px"
        placeholder="Nova senha">
      <button class="btn-submit" style="background: var(--surface); color: white; border: 1px solid var(--border);"
        onclick="setPassword()">Definir / Alterar Senha</button>
      <button class="btn-submit" style="background: rgba(255,90,121,0.1); color: var(--red); margin-top:12px"
        onclick="removePassword()">Remover Senha</button>
    </div>

    <div class="stat-card" style="margin-bottom:16px">
      <div class="stat-label">Dados</div>
      <button class="btn-submit" style="background: var(--surface); color: white; border: 1px solid var(--border);"
        onclick="exportCSV()">Exportar CSV</button>
      <button class="btn-submit" style="background: rgba(255,90,121,0.1); color: var(--red); margin-top:12px"
        onclick="clearAll()">Limpar todos os dados</button>
    </div>
  </div>

  <button class="fab" onclick="openModal()">Novo Lançamento</button>

  <div class="modal-overlay" id="modal-overlay" onclick="if(event.target===this)closeModal()">
    <div class="modal">
      <div style="width:40px; height:4px; background:var(--border); border-radius:10px; margin: 0 auto 24px;"></div>

      <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:20px">
        <button id="btn-income" class="tab active" style="width:100%" onclick="setType('income')">Receita</button>
        <button id="btn-expense" class="tab" style="width:100%" onclick="setType('expense')">Despesa</button>
      </div>

      <input type="text" id="input-desc" class="form-input" placeholder="O que você comprou/recebeu?">
      <input type="number" id="input-amount" class="form-input" placeholder="Valor R$">

      <select class="form-select" id="input-repeat" onchange="toggleRepeat()">
        <option value="none">Lançamento único</option>
        <option value="installment">Compra parcelada</option>
        <option value="recurring">Despesa fixa (recorrente)</option>
      </select>

      <div id="repeat-times-group" style="display:none">
        <input type="number" id="input-repeat-times" class="form-input" placeholder="Quantos meses?">
      </div>

      <select class="form-select" id="input-cat"></select>
      <input type="date" id="input-date" class="form-input">

      <button class="btn-submit" id="modal-submit-btn" onclick="submitTransaction()">Confirmar Lançamento</button>
    </div>
  </div>

  <div id="toast"
    style="position:fixed; bottom:110px; left:50%; transform:translateX(-50%); background: #fff; color: #000; padding: 12px 24px; border-radius: 12px; font-weight: 600; font-size: 14px; opacity: 0; transition: 0.3s; pointer-events:none; z-index:999">
  </div>

  <script>
    // --- LÓGICA MANTIDA E OTIMIZADA ---
    let state = { transactions: [], budget: 0, activePage: 'dashboard' };
    let currentMonth = new Date().getMonth();
    let currentYear = new Date().getFullYear();
    let currentType = 'income';

    const INCOME_CATS = ['Salário', 'Freelance', 'Investimentos', 'Outros'];
    const EXPENSE_CATS = ['Alimentação', 'Transporte', 'Moradia', 'Saúde', 'Lazer', 'Contas', 'Assinaturas', 'Outros'];

    function save() { localStorage.setItem('fp_modern_state', JSON.stringify(state)); }
    function load() {
      const d = localStorage.getItem('fp_modern_state');
      if (d) state = JSON.parse(d);
    }

    function fmt(n) { return 'R$ ' + Math.abs(n).toLocaleString('pt-BR', { minimumFractionDigits: 2 }); }

    function addSafeMonths(dateStr, months) {
      const [y, m, d] = dateStr.split('-').map(Number);
      const date = new Date(y, m - 1 + months, 1);
      const maxDay = new Date(date.getFullYear(), date.getMonth() + 1, 0).getDate();
      date.setDate(Math.min(d, maxDay));
      return date.toISOString().split('T')[0];
    }

    function showPage(id, btn) {
      document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.getElementById('page-' + id).classList.add('active');
      if (btn) btn.classList.add('active');
      state.activePage = id;
      save();
      render();
    }

    function changeMonth(d) {
      currentMonth += d;
      if (currentMonth < 0) { currentMonth = 11; currentYear--; }
      if (currentMonth > 11) { currentMonth = 0; currentYear++; }
      render();
    }

    function openModal() {
      document.getElementById('input-date').value = new Date().toISOString().split('T')[0];
      document.getElementById('modal-overlay').classList.add('open');
      setType('expense');
      populateCats();
    }

    function closeModal() { document.getElementById('modal-overlay').classList.remove('open'); }

    function setType(t) {
      currentType = t;
      document.getElementById('btn-income').className = t === 'income' ? 'tab active' : 'tab';
      document.getElementById('btn-expense').className = t === 'expense' ? 'tab active' : 'tab';
      document.getElementById('modal-submit-btn').style.background = t === 'income' ? 'var(--green)' : 'var(--red)';
      populateCats();
    }

    function populateCats() {
      const cats = currentType === 'income' ? INCOME_CATS : EXPENSE_CATS;
      document.getElementById('input-cat').innerHTML = cats.map(c => `<option>${c}</option>`).join('');
    }

    function toggleRepeat() {
      const val = document.getElementById('input-repeat').value;
      document.getElementById('repeat-times-group').style.display = val === 'none' ? 'none' : 'block';
    }

    function submitTransaction() {
      const desc = document.getElementById('input-desc').value;
      const amount = parseFloat(document.getElementById('input-amount').value);
      const date = document.getElementById('input-date').value;
      const cat = document.getElementById('input-cat').value;
      const repeat = document.getElementById('input-repeat').value;
      const times = parseInt(document.getElementById('input-repeat-times').value) || 1;

      if (!desc || !amount) return toast("Preencha os campos!");

      if (repeat === 'none') {
        state.transactions.unshift({ id: Date.now(), type: currentType, desc, amount, cat, date });
      } else {
        const val = repeat === 'installment' ? (amount / times) : amount;
        for (let i = 0; i < times; i++) {
          state.transactions.push({
            id: Date.now() + i,
            type: currentType,
            desc: repeat === 'installment' ? `${desc} (${i + 1}/${times})` : desc,
            amount: val,
            cat,
            date: addSafeMonths(date, i)
          });
        }
      }
      save();
      closeModal();
      render();
      toast("Lançado com sucesso!");
    }

    function toast(m) {
      const t = document.getElementById('toast');
      t.textContent = m; t.style.opacity = 1;
      setTimeout(() => t.style.opacity = 0, 2000);
    }

    function render() {
      const months = ['Janeiro', 'Fevereiro', 'Março', 'Abril', 'Maio', 'Junho', 'Julho', 'Agosto', 'Setembro', 'Outubro', 'Novembro', 'Dezembro'];
      document.getElementById('month-label').textContent = `${months[currentMonth]} ${currentYear}`;

      const key = `${currentYear}-${String(currentMonth + 1).padStart(2, '0')}`;
      const txs = state.transactions.filter(t => t.date.startsWith(key));

      const inc = txs.filter(t => t.type === 'income').reduce((s, t) => s + t.amount, 0);
      const exp = txs.filter(t => t.type === 'expense').reduce((s, t) => s + t.amount, 0);

      document.getElementById('bal-total').textContent = fmt(inc - exp);
      document.getElementById('bal-income').textContent = fmt(inc);
      document.getElementById('bal-expense').textContent = fmt(exp);

      // Dashboard List
      document.getElementById('dash-tx-list').innerHTML = txs.slice(0, 5).map(txHTML).join('') || "<p style='color:var(--muted); text-align:center'>Nada por aqui</p>";
      document.getElementById('all-tx-list').innerHTML = txs.map(txHTML).join('');

      // Budget
      const bSec = document.getElementById('budget-section');
      if (state.budget > 0) {
        const pct = Math.min((exp / state.budget) * 100, 100);
        bSec.innerHTML = `
            <div class="budget-card">
                <div class="bar-info"><span>Meta Mensal</span><span>${pct.toFixed(0)}%</span></div>
                <div class="progress-bg"><div class="progress-fill" style="width:${pct}%; background:${pct > 90 ? 'var(--red)' : 'var(--blue)'}"></div></div>
                <div class="bar-info" style="margin-bottom:0"><span style="color:var(--muted)">Gasto: ${fmt(exp)}</span><span>Limite: ${fmt(state.budget)}</span></div>
            </div>`;
      } else bSec.innerHTML = '';

      // Charts
      if (state.activePage === 'charts') {
        const cats = {};
        txs.filter(t => t.type === 'expense').forEach(t => cats[t.cat] = (cats[t.cat] || 0) + t.amount);
        document.getElementById('expense-bars').innerHTML = Object.entries(cats).map(([c, v]) => `
            <div class="bar-item">
                <div class="bar-info"><span>${c}</span><span>${fmt(v)}</span></div>
                <div class="bar-track"><div class="bar-fill" style="background:var(--violet); width:${(v / exp) * 100}%"></div></div>
            </div>`).join('');
        drawDonut(inc, exp);
      }
    }

    function txHTML(t) {
      return `
    <div class="tx-item">
        <div class="tx-icon ${t.type}">${t.type === 'income' ? '↓' : '↑'}</div>
        <div class="tx-info">
            <div class="tx-desc">${t.desc}</div>
            <div class="tx-meta">${t.cat}</div>
        </div>
        <div class="tx-amount ${t.type}">${t.type === 'income' ? '+' : '-'}${fmt(t.amount)}</div>
    </div>`;
    }

    function drawDonut(inc, exp) {
      const canvas = document.getElementById('donut');
      const ctx = canvas.getContext('2d');
      const total = inc + exp;
      ctx.clearRect(0, 0, 120, 120);
      if (total === 0) return;

      let start = -Math.PI / 2;
      [{ v: inc, c: '#2ce58b' }, { v: exp, c: '#ff5a79' }].forEach(d => {
        const slice = (d.v / total) * Math.PI * 2;
        ctx.beginPath(); ctx.moveTo(60, 60); ctx.arc(60, 60, 50, start, start + slice);
        ctx.fillStyle = d.c; ctx.fill(); start += slice;
      });
      ctx.beginPath(); ctx.arc(60, 60, 35, 0, Math.PI * 2); ctx.fillStyle = '#12141c'; ctx.fill();
    }

    function saveBudget(v) { state.budget = parseFloat(v) || 0; save(); render(); }
    function clearAll() { if (confirm("Apagar tudo?")) { state.transactions = []; save(); render(); } }

    function checkLogin() {
      const p = document.getElementById('login-password').value;
      if (p === state.password) {
        document.getElementById('login-overlay').classList.remove('active');
        document.getElementById('login-password').value = '';
      } else {
        toast("Senha incorreta!");
      }
    }

    function setPassword() {
      const p = document.getElementById('new-password-input').value;
      if (!p) return toast("Digite uma senha válida!");
      state.password = p;
      save();
      document.getElementById('new-password-input').value = '';
      toast("Senha definida com sucesso!");
    }

    function removePassword() {
      if (state.password) {
        if (confirm("Tem certeza que deseja remover a senha?")) {
          delete state.password;
          save();
          toast("Senha removida!");
        }
      } else {
        toast("Nenhuma senha definida.");
      }
    }

    load();
    if (state.budget) document.getElementById('budget-input').value = state.budget;
    if (state.password) {
      document.getElementById('login-overlay').classList.add('active');
    }
    showPage(state.activePage || 'dashboard');
  </script>

</body>

</html>
